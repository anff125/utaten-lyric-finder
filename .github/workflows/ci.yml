name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.py"
      - "requirements.txt"
      - "build_portable.ps1"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.py"
      - "requirements.txt"
      - "build_portable.ps1"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  lint-and-runtime-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          # 優化 1：開啟 setup-python 內建的 pip 快取
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Upgrade pip and install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run ruff
        shell: pwsh
        run: |
          ruff check .

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Invoke-ScriptAnalyzer -Path ./build_portable.ps1 -EnableExit

      - name: Runtime smoke test
        shell: pwsh
        run: |
          python -c "import tkinter; import customtkinter; import spotify_api; import web_scraper; import matching; print('[SUCCESS] runtime smoke imports loaded')"

      - name: Dry-run portable build script
        shell: pwsh
        run: |
          Write-Host "開始驗證打包腳本 (Dry-run)..."

          $OutputRoot = "build\portable\utaten-lyric-finder"
          $PythonRoot = Join-Path $OutputRoot "python_env"
          New-Item -ItemType Directory -Path $PythonRoot -Force | Out-Null

          ./build_portable.ps1 -SkipEnvBuild $true

          $ZipPath = "build\portable\utaten-lyric-finder.zip"
          if (-Not (Test-Path $ZipPath)) {
              Write-Error "[ERROR] Dry-run 失敗：找不到預期的壓縮檔 $ZipPath"
              exit 1
          }

          Write-Host "[SUCCESS] 打包腳本執行無誤，產出物已成功生成！"
