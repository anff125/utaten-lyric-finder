name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.py"
      - "requirements.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.py"
      - "requirements.txt"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  lint-and-runtime-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          # 優化 1：開啟 setup-python 內建的 pip 快取
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Upgrade pip and install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run ruff
        shell: pwsh
        run: |
          ruff check .

      - name: Runtime smoke test
        shell: pwsh
        run: |
          python -c "import tkinter; import customtkinter; import spotify_api; import web_scraper; import matching; print('[SUCCESS] runtime smoke imports loaded')"
